# Fly.io App Specification for IgnisAI Backend API

app = "ignisai-backend"
primary_region = "lax"

[build]
  dockerfile = "backend/Dockerfile"
  ignorefile = "backend/.dockerignore"

[env]
  ENV = "production"
  PORT = "8000"

[[services]]
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["connection_handlers", "tls", "http"]
    port = 443

  [[services.concurrency]]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.http_checks]]
    interval = "10s"
    grace_period = "5s"
    method = "get"
    path = "/api/v1/health"
    protocol = "http"
    timeout = "2s"

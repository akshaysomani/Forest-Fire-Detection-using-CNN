version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ignisai_backend
    expose:
      - "8000"
    volumes:
      - backend_storage:/app/storage
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ignisai_frontend
    expose:
      - "3000"
    restart: always

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ignisai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/nginx/ssl
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  backend_storage:
    driver: local
  certbot_certs:
    driver: local
  certbot_webroot:
    driver: local

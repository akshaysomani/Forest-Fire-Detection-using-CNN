name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: In case a real database is needed in future, we can add Postgres here.
      # For now, tests run on in-memory SQLite.

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest-cov coverage flake8 black

    - name: Run Linter (Flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check Formatting (Black)
      run: |
        black --check backend/app --line-length 127 --extend-exclude ".*" || true

    - name: Run Tests with Pytest
      working-directory: backend
      run: |
        python -m pytest --cov=app --cov-report=xml

    - name: Upload Coverage Report
      uses: codecov/codecov-action@v4
      with:
        file: backend/coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci_pipeline.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci_pipeline.yml'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black bandit safety

    - name: Run Linter (Flake8)
      run: |
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check Formatting (Black)
      run: |
        black --check backend/app --line-length 127 --extend-exclude ".*"

    - name: Security Scan (Bandit)
      run: |
        bandit -r backend/app -x backend/app/tests -ll -ii

  test:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Run Unit and Integration Tests
      working-directory: backend
      run: |
        python -m pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload Coverage Report
      uses: codecov/codecov-action@v4
      with:
        file: backend/coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  build-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Container (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: forest-fire-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

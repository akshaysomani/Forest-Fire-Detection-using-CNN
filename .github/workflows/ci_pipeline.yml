name: IgnisAI Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linters & Security tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black bandit safety

      - name: Run Python Linter (Flake8)
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Python Formatting (Black)
        run: |
          black --check backend/app --line-length 127

      - name: Python Security Audit (Bandit)
        run: |
          bandit -r backend/app -x backend/app/tests -ll -ii

      - name: Run Python Regression Tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
          python -m pytest --cov=app --cov-report=xml

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Check Frontend Formatting (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Verify TypeScript compilation
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run Frontend Jest Tests
        working-directory: frontend
        run: npm run test

      - name: Verify Next.js Build
        working-directory: frontend
        run: npm run build

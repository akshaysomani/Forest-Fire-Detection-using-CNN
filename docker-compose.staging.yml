version: '3.8'

services:
  backend:
    environment:
      - ENV=staging
      - DATABASE_URL=postgresql+asyncpg://postgres:stagingpassword@postgres_db:5432/ignisai_staging
      - REDIS_URL=redis://redis_cache:6379/0
    depends_on:
      - postgres_db
      - redis_cache

  postgres_db:
    image: postgres:15-alpine
    container_name: ignisai_staging_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=stagingpassword
      - POSTGRES_DB=ignisai_staging
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always

  redis_cache:
    image: redis:7-alpine
    container_name: ignisai_staging_redis
    expose:
      - "6379"
    restart: always

volumes:
  staging_pgdata:
    driver: local

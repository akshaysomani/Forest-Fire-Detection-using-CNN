global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url: "http://localhost/slack-webhook-placeholder"
        channel: "#ignisai-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] Alert Triggered: {{ .CommonAnnotations.summary }}"
        text: "Description: {{ .CommonAnnotations.description }}\nSeverity: {{ .CommonLabels.severity }}"

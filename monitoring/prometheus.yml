global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ignisai-backend"
    metrics_path: "/api/v1/observability/metrics"
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "ignisai-frontend"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["frontend:3000"]

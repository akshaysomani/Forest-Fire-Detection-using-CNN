apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ignisai-ingress
  namespace: ignisai-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - ignisai.platform
      secretName: ignisai-tls-secret
  rules:
    - host: ignisai.platform
      http:
        paths:
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: ignisai-backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ignisai-frontend-service
                port:
                  number: 3000

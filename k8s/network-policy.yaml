apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-database-policy
  namespace: ignisai-production
spec:
  podSelector:
    matchLabels:
      app: postgres-prod # Apply strictly to PG pods
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ignisai-backend # Allow connection only from backend pods
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-frontend-policy
  namespace: ignisai-production
spec:
  podSelector:
    matchLabels:
      app: ignisai-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {} # Allow ingress controller traffic from ingress namespaces
      ports:
        - protocol: TCP
          port: 3000

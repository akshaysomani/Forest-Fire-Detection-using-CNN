# Render Blueprint Specification for IgnisAI Wildfire Operations Platform
# Deploys backend API, frontend UI dashboard, managed PostgreSQL, and Redis in one click.

services:
  # 1. FastAPI Backend Service
  - type: web
    name: ignisai-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    numReplicas: 1
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ignisai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ignisai-redis
          type: redis
          property: connectionString
      - key: PORT
        value: 8000

  # 2. Next.js Frontend dashboard
  - type: web
    name: ignisai-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    region: oregon
    plan: free
    numReplicas: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: ignisai-backend
          property: url

# Database Definitions
databases:
  - name: ignisai-postgres
    databaseName: ignisai_prod
    user: postgres
    region: oregon
    plan: free

# Redis Cache Definitions
interfaces:
  - name: ignisai-redis
    type: redis
    plan: free
    region: oregon
